<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoveMoney</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'DM Sans',sans-serif;background:#fff;color:#1e293b;max-width:480px;margin:auto}
header{padding:16px;font-family:'Syne';font-size:22px;font-weight:bold;background:#1e293b;color:#fff;position:sticky;top:0}
nav{position:fixed;bottom:0;width:100%;max-width:480px;display:flex;background:#fff;border-top:1px solid #ccc}
nav button{flex:1;padding:12px;border:none;background:none}
section{display:none;padding:16px;padding-bottom:100px}
.active{display:block}
.card{padding:14px;border-radius:16px;background:#f8fafc;margin-bottom:12px;box-shadow:0 3px 8px rgba(0,0,0,0.05)}
input,button{padding:12px;width:100%;border-radius:10px;border:1px solid #ccc;margin-top:6px}
button.primary{background:#1e293b;color:#fff}
.badge{padding:4px 8px;border-radius:8px;font-size:12px}
.ok{background:#d1fae5}
.mora{background:#fee2e2}
.small{font-size:13px;color:#555}
</style>
</head>

<body>

<header>MoveMoney</header>

<section id="lista" class="active">
<h2>Préstamos</h2>
<div id="listaPrestamos"></div>
</section>

<section id="detalle">
<h2>Detalle</h2>
<div id="detalleContenido"></div>
</section>

<section id="new">
<h2>Nuevo préstamo</h2>
<input id="nombre" placeholder="Nombre">
<input id="capital" type="number" placeholder="Capital">
<input id="cuotas" type="number" placeholder="Cuotas">
<input id="fechaInicio" type="date">
<button class="primary" onclick="crearPrestamo()">Guardar</button>
</section>

<nav>
<button onclick="nav('lista')">📋</button>
<button onclick="nav('new')">➕</button>
</nav>

<script>
const supabase = window.supabase.createClient(
'https://amctptmlgfzdoizaxkix.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9'
);

function nav(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function format(n){return '$'+Number(n||0).toLocaleString('en-US');}

function addDays(date,days){
const d=new Date(date);
d.setDate(d.getDate()+days);
return d.toISOString().split('T')[0];
}

async function crearPrestamo(){
const nombre=document.getElementById('nombre').value;
const capital=Number(document.getElementById('capital').value);
const cuotas=Number(document.getElementById('cuotas').value);
const fecha=document.getElementById('fechaInicio').value;

if(!nombre||!capital||!cuotas||!fecha){alert('Faltan datos');return}

const total=Math.round(capital*1.2);
const cuota=Math.round(total/cuotas);

const plan=[];
for(let i=0;i<cuotas;i++){
plan.push({n:i+1,monto:cuota,pagado:0,fecha:addDays(fecha,i),estado:'pendiente'});
}

await supabase.from('prestamos').insert({
datos:{nombre,capital,total,plan,bitacora:[]}
});

cargar();
nav('lista');
}

async function verDetalle(id){
const {data}=await supabase.from('prestamos').select('*').eq('id',id).single();
const d=data.datos;

let html=`<div class='card'><b>${d.nombre}</b><br>Total ${format(d.total)}</div>`;

html+="<div class='card small'>Historial:</div>";

(d.bitacora||[]).forEach(b=>{
html+=`<div class='small'>${b}</div>`;
});

d.plan.forEach((c,i)=>{
let estado='ok';
if(c.estado!=='pagado' && c.fecha < new Date().toISOString().split('T')[0]) estado='mora';

html+=`
<div class='card'>
Cuota ${c.n} - ${format(c.monto)}
<div class='badge ${estado}'>${c.estado}</div>
<input type='date' value='${c.fecha}' onchange="editarFecha(${id},${i},this.value)">
<button onclick="pagarCompleto(${id},${i})">Pagar</button>
<button onclick="pagoParcial(${id},${i})">Parcial</button>
</div>
`;
});

document.getElementById('detalleContenido').innerHTML=html;
nav('detalle');
}

async function editarFecha(id,i,val){
const {data}=await supabase.from('prestamos').select('*').eq('id',id).single();
const p=data.datos;

p.plan[i].fecha=val;
p.bitacora.push(`Fecha cuota ${i+1} → ${val}`);

await supabase.from('prestamos').update({datos:p}).eq('id',id);
}

async function pagarCompleto(id,i){
const {data}=await supabase.from('prestamos').select('*').eq('id',id).single();
const p=data.datos;

p.plan[i].pagado=p.plan[i].monto;
p.plan[i].estado='pagado';
p.bitacora.push(`Pago completo cuota ${i+1}`);

await supabase.from('prestamos').update({datos:p}).eq('id',id);

cargar();
verDetalle(id);
}

async function pagoParcial(id,i){
const monto=prompt('Monto recibido');
if(!monto) return;

const {data}=await supabase.from('prestamos').select('*').eq('id',id).single();
const p=data.datos;

p.plan[i].pagado+=Number(monto);

if(p.plan[i].pagado>=p.plan[i].monto){
p.plan[i].estado='pagado';
}

p.bitacora.push(`Pago parcial cuota ${i+1}: $${monto}`);

await supabase.from('prestamos').update({datos:p}).eq('id',id);

cargar();
verDetalle(id);
}

async function cargar(){
const {data}=await supabase.from('prestamos').select('*');
const cont=document.getElementById('listaPrestamos');
cont.innerHTML='';

(data||[]).forEach(p=>{
const d=p.datos;

const el=document.createElement('div');
el.className='card';
el.innerHTML=`
<b>${d.nombre}</b><br>
${format(d.total)}<br>
<button onclick="verDetalle(${p.id})">Abrir</button>
`;

cont.appendChild(el);
});
}

cargar();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
